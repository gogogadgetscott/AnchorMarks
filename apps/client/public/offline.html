<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnchorMarks - Offline</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f3f4f6;
        color: #1f2937;
        text-align: center;
      }

      .container {
        max-width: 400px;
        padding: 2rem;
      }

      h1 {
        color: #6366f1;
        margin-bottom: 1rem;
      }

      p {
        color: #4b5563;
        line-height: 1.5;
        margin-bottom: 2rem;
      }

      button {
        background-color: #6366f1;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #4f46e5;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>You're Offline</h1>
      <p>
        It looks like you don't have an internet connection. Some features of
        AnchorMarks may not be available until you're back online.
      </p>
      <button data-action="retry-connection">Retry Connection</button>
    </div>
    <script src="/retry.js"></script>
  </body>
</html>
