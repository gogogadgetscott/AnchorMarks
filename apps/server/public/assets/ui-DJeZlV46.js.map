export default "<div id=\"tour-overlay\" class=\"tour-overlay hidden\"></div>\n<div id=\"tour-popover\" class=\"tour-popover hidden\">\n  <div class=\"tour-header\">\n    <div class=\"tour-steps\">\n      <span class=\"tour-step\" id=\"tour-step-1\">1</span>\n      <span class=\"tour-step\" id=\"tour-step-2\">2</span>\n      <span class=\"tour-step\" id=\"tour-step-3\">3</span>\n    </div>\n    <button class=\"btn-icon tour-close\" data-action=\"skip-tour\">\n      <svg\n        viewBox=\"0 0 24 24\"\n        fill=\"none\"\n        stroke=\"currentColor\"\n        stroke-width=\"2\"\n      >\n        <line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\" />\n        <line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\" />\n      </svg>\n    </button>\n  </div>\n  <div class=\"tour-content\">\n    <h3 id=\"tour-title\"></h3>\n    <p id=\"tour-description\"></p>\n  </div>\n  <div class=\"tour-actions\">\n    <button class=\"btn btn-secondary tour-skip\" data-action=\"skip-tour\">\n      Skip\n    </button>\n    <button class=\"btn btn-primary tour-next\" id=\"tour-next-btn\">Next</button>\n  </div>\n</div>\n"
