export default "<div id=\"quick-launch\" class=\"quick-launch hidden\">\n  <div class=\"quick-launch-backdrop\"></div>\n  <div class=\"quick-launch-panel\">\n    <div class=\"quick-launch-header\">\n      <span>Quick Launch</span>\n      <div class=\"quick-launch-hints\">\n        <kbd>↑↓</kbd> navigate <kbd>Enter</kbd> open <kbd>Esc</kbd> close\n      </div>\n    </div>\n    <input\n      type=\"text\"\n      id=\"quick-launch-input\"\n      placeholder=\"Search bookmarks, folders, or type > for commands...\"\n      autocomplete=\"off\"\n    />\n    <div class=\"quick-launch-tips\">\n      <span class=\"tip\">Type to search bookmarks</span>\n      <span class=\"tip\"><kbd>></kbd> commands</span>\n      <span class=\"tip\"><kbd>@</kbd> folders</span>\n      <span class=\"tip\"><kbd>#</kbd> tags</span>\n    </div>\n    <div id=\"quick-launch-list\" class=\"quick-launch-list\"></div>\n  </div>\n</div>\n"
