export default "<div id=\"folder-modal\" class=\"modal hidden\">\n  <div class=\"modal-backdrop\"></div>\n  <div class=\"modal-content modal-sm\">\n    <div class=\"modal-header\">\n      <h2 id=\"folder-modal-title\">New Folder</h2>\n      <button class=\"btn-icon modal-close\">\n        <svg\n          viewBox=\"0 0 24 24\"\n          fill=\"none\"\n          stroke=\"currentColor\"\n          stroke-width=\"2\"\n        >\n          <line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\" />\n          <line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\" />\n        </svg>\n      </button>\n    </div>\n    <form id=\"folder-form\">\n      <input type=\"hidden\" id=\"folder-id\" />\n      <div class=\"form-group\">\n        <label for=\"folder-name\">Folder Name *</label>\n        <input\n          type=\"text\"\n          id=\"folder-name\"\n          required\n          placeholder=\"My Collection\"\n        />\n      </div>\n      <div class=\"form-group\">\n        <label for=\"folder-parent\">Parent Folder</label>\n        <select id=\"folder-parent\">\n          <option value=\"\">None (Top Level)</option>\n        </select>\n      </div>\n      <div class=\"form-group\">\n        <label>Color</label>\n        <div class=\"color-picker\">\n          <button\n            type=\"button\"\n            class=\"color-option active\"\n            style=\"--color: #6366f1\"\n            data-color=\"#6366f1\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #8b5cf6\"\n            data-color=\"#8b5cf6\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #ec4899\"\n            data-color=\"#ec4899\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #ef4444\"\n            data-color=\"#ef4444\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #f97316\"\n            data-color=\"#f97316\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #eab308\"\n            data-color=\"#eab308\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #22c55e\"\n            data-color=\"#22c55e\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #14b8a6\"\n            data-color=\"#14b8a6\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #0ea5e9\"\n            data-color=\"#0ea5e9\"\n          ></button>\n          <button\n            type=\"button\"\n            class=\"color-option\"\n            style=\"--color: #64748b\"\n            data-color=\"#64748b\"\n          ></button>\n        </div>\n        <input type=\"hidden\" id=\"folder-color\" value=\"#6366f1\" />\n      </div>\n      <div class=\"modal-footer\">\n        <button type=\"button\" class=\"btn btn-secondary modal-cancel\">\n          Cancel\n        </button>\n        <button type=\"submit\" class=\"btn btn-primary\">Create Folder</button>\n      </div>\n    </form>\n  </div>\n</div>\n"
