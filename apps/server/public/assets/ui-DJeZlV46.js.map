export default "<div id=\"bulk-bar\" class=\"bulk-bar hidden\">\n  <div class=\"bulk-left\">\n    <span id=\"bulk-count\">0 selected</span>\n    <button\n      class=\"btn-link\"\n      id=\"bulk-select-all-btn\"\n      style=\"margin-left: 1rem; font-size: 0.85rem\"\n      data-action=\"bulk-select-all\"\n    >\n      Select All\n    </button>\n    <button\n      class=\"btn-link\"\n      id=\"bulk-unselect-all-btn\"\n      style=\"margin-left: 0.5rem; font-size: 0.85rem\"\n      data-action=\"bulk-unselect-all\"\n    >\n      Unselect All\n    </button>\n  </div>\n  <div class=\"bulk-actions\">\n    <button class=\"btn btn-ghost\" id=\"bulk-favorite-btn\">Favorite</button>\n    <button class=\"btn btn-secondary\" id=\"bulk-tag-btn\">Tag</button>\n    <button class=\"btn btn-ghost\" id=\"bulk-untag-btn\">Remove Tags</button>\n    <div class=\"bulk-move\">\n      <select id=\"bulk-move-select\"></select>\n      <button class=\"btn btn-secondary\" id=\"bulk-move-btn\">Move</button>\n    </div>\n    <button class=\"btn btn-danger\" id=\"bulk-delete-btn\">Delete</button>\n    <button class=\"btn btn-ghost\" id=\"bulk-clear-btn\">Clear</button>\n  </div>\n</div>\n"
